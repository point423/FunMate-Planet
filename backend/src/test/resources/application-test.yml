spring:
  # 使用内存数据库 H2，不依赖真实 MySQL
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

  # 禁用真实 Redis，在测试中我们会 Mock 它
  data:
    redis:
      host: localhost
      port: 6379
