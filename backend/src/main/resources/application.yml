server:
  port: 8080

spring:
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:3306/funmate_planet?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:1234567}

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      database: 0
      timeout: 3000ms

jwt:
  # 安全加固：不建议硬编码，默认从环境变量读取
  secret: ${JWT_SECRET:FunMatePlanetDefaultSecretKeyForTestingOnly2024}
  expire-seconds: 86400

# 文件上传配置
upload:
  dir: uploads/
  url: http://localhost:8080/static/

ai:
  api-key: ${AI_API_KEY:ollama}
  base-url: ${AI_BASE_URL:http://ollama:11434/v1}
  model: ${AI_MODEL:qwen2.5:1.5b}
