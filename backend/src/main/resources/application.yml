server:
  port: ${PORT:8080}

spring:
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 优先使用云平台 DATABASE_URL；本地和 Docker Compose 可继续使用拆分变量
    url: ${DATABASE_URL:jdbc:mysql://${MYSQLHOST:${DB_HOST:localhost}}:${MYSQLPORT:${DB_PORT:3306}}/${MYSQLDATABASE:${DB_NAME:funmate_planet}}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQLUSER:${DB_USERNAME:root}}
    password: ${MYSQLPASSWORD:${DB_PASSWORD:1234567}}

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update  # 自动同步实体类到数据库表结构
    show-sql: true      # 控制台显示 SQL
    properties:
      hibernate:
        format_sql: true  # 格式化 SQL
    open-in-view: false   # 关闭 OSIV，推荐设置

  # 文件上传（multipart）限制：增大上传上限以支持头像等图片
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Redis 配置
  data:
    redis:
      # 云平台通常提供 REDIS_URL；本地和 Docker Compose 可继续使用 REDIS_HOST/REDIS_PORT
      url: ${REDIS_URL:redis://${REDISHOST:${REDIS_HOST:localhost}}:${REDISPORT:${REDIS_PORT:6379}}}
      database: ${REDIS_DATABASE:0}
      timeout: 3000ms
jwt:
  secret: ${JWT_SECRET:FunMatePlanetSecretKeyForJwtTokenGeneration2024}
  expire-seconds: ${JWT_EXPIRE_SECONDS:86400}
# 文件上传配置
upload:
  dir: ${UPLOAD_DIR:uploads/}
  url: ${UPLOAD_PUBLIC_URL:http://localhost:${PORT:8080}/static/}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

ai:
  api-key: ${AI_API_KEY:${API_KEY:ollama}}
  base-url: ${AI_BASE_URL:http://ollama:11434/v1}
  model: ${AI_MODEL:qwen2.5:1.5b}

