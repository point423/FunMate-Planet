name: Security Scan

on:
  push:
    branches: [ main, develop, 'feature-*' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  gitleaks:
    name: Secret Leak Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
